line-length = 120
target-version = "py311"
exclude = [
    ".venv",
    "__pycache__",
    "docs",
    "script_example",
]

[lint]
select = [
    "S",     # flake8-bandit (security)
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "B",     # flake8-bugbear
    "W",     # pycodestyle warnings
    "C90",   # mccabe complexity
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "C4",    # flake8-comprehensions
    "T10",   # flake8-debugger
    "ISC",   # flake8-implicit-str-concat
    "ICN",   # flake8-import-conventions
    "PIE",   # flake8-pie
    "T20",   # flake8-print
    "PT",    # flake8-pytest-style
    "Q",     # flake8-quotes
    "RSE",   # flake8-raise
    "RET",   # flake8-return
    "SLF",   # flake8-self
    "SIM",   # flake8-simplify
    "ERA",   # eradicate (commented-out code)
    "PL",    # pylint (all)
    "PLC",   # pylint convention
    "PLE",   # pylint error
    "PLR",   # pylint refactor
    "PLW",   # pylint warning
    "TRY",   # tryceratops
    "RUF",   # ruff-specific rules
    "EM",    # flake8-errmsg
    "PTH",   # flake8-use-pathlib
    "PD",    # pandas-vet
    "NPY",   # numpy-specific rules
]
ignore = [
    "E501",     # line too long (handled by line-length setting)
    "PIE790",   # unnecessary `pass` statement
    "PT001",    # use @pytest.fixture over @pytest.fixture()
    "RET504",   # unnecessary assignment before return
    "PLR0913",  # too many arguments to function call
    "D401",     # first line of docstring should be in imperative mood
    "ISC001",   # implicitly concatenated string (conflicts with formatter)
    "ICN001",   # unconventional import alias (team standard uses `import x.y as y`)
    "PLR0402",  # manual-from-import (team standard keeps `import x.y as y`)
    "C408",     # unnecessary dict() call (company standard uses dict() builtins)
    "PLE1205",  # too many logging args (structured logging uses dict as context)
    "Q000",     # bad quotes inline string (allow single quotes)
    "TRY400",   # use `logging.exception` instead of `logging.error` (company standard uses log.error)
]

[lint.per-file-ignores]
"**/tests/*" = ["S101", "F811", "F841", "SLF001", "PLR2004", "PLR0915"]

[lint.isort]
relative-imports-order = "closest-to-furthest"
section-order = ["future", "standard-library", "third-party", "kbra-internal", "first-party", "local-folder"]

[format]
quote-style = "double"
indent-style = "space"
